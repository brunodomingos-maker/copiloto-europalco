<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Europalco — Gestão de Projetos</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Roboto:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --y: #F2C200; --yd: #8A6E00; --yl: rgba(242,194,0,0.12); --ym: rgba(242,194,0,0.4);
  --bg: #F8F7F4; --card: #FFFFFF; --border: rgba(0,0,0,0.08); --border2: rgba(0,0,0,0.14);
  --text: #111111; --dim: rgba(17,17,17,0.42); --mid: rgba(17,17,17,0.65);
  --green: #1E7A4A; --red: #C0392B; --blue: #1A5CA8;
  --mono: 'DM Mono', monospace; --sans: 'Roboto', sans-serif;
}
html, body { height: 100%; background: var(--bg); color: var(--text); font-family: var(--sans); -webkit-font-smoothing: antialiased; }

/* ── LAYOUT ── */
.app { display: flex; height: 100vh; overflow: hidden; }
.sidebar { width: 220px; background: #111; flex-shrink: 0; display: flex; flex-direction: column; }
.main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
.topbar { height: 56px; background: var(--card); border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; padding: 0 24px; flex-shrink: 0; }
.content { flex: 1; overflow-y: auto; padding: 24px; }
.content::-webkit-scrollbar { width: 4px; }
.content::-webkit-scrollbar-track { background: transparent; }
.content::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }

/* ── SIDEBAR ── */
.sidebar-logo { padding: 20px 16px 16px; border-bottom: 1px solid rgba(255,255,255,0.07); }
.sidebar-logo-text { font-family: var(--sans); font-weight: 800; font-size: 14px; letter-spacing: 0.16em; color: var(--y); }
.sidebar-logo-sub { font-family: var(--mono); font-size: 9px; color: rgba(255,255,255,0.3); letter-spacing: 0.08em; margin-top: 2px; }
.sidebar-nav { flex: 1; padding: 12px 8px; display: flex; flex-direction: column; gap: 2px; }
.nav-item { display: flex; align-items: center; gap: 10px; padding: 9px 10px; border-radius: 7px; cursor: pointer; transition: all 0.15s; font-family: var(--mono); font-size: 11px; color: rgba(255,255,255,0.45); letter-spacing: 0.04em; -webkit-tap-highlight-color: transparent; }
.nav-item:hover { background: rgba(255,255,255,0.06); color: rgba(255,255,255,0.75); }
.nav-item.active { background: var(--yl); color: var(--y); }
.nav-item svg { width: 15px; height: 15px; flex-shrink: 0; }
.nav-section { font-family: var(--mono); font-size: 8px; letter-spacing: 0.18em; color: rgba(255,255,255,0.2); text-transform: uppercase; padding: 14px 10px 6px; }
.sidebar-bottom { padding: 12px 8px; border-top: 1px solid rgba(255,255,255,0.07); }
.copilot-btn { width: 100%; padding: 11px 10px; background: var(--y); border: none; border-radius: 8px; font-family: var(--sans); font-size: 12px; font-weight: 700; color: #111; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 7px; transition: opacity 0.2s; letter-spacing: 0.02em; }
.copilot-btn:hover { opacity: 0.9; }
.copilot-btn svg { width: 14px; height: 14px; }

/* ── TOPBAR ── */
.topbar-title { font-family: var(--sans); font-weight: 700; font-size: 15px; color: var(--text); }
.topbar-right { display: flex; align-items: center; gap: 10px; }
.sheets-status { display: flex; align-items: center; gap: 6px; font-family: var(--mono); font-size: 10px; color: var(--dim); padding: 5px 10px; border: 1px solid var(--border); border-radius: 6px; cursor: pointer; transition: all 0.15s; }
.sheets-status:hover { border-color: var(--border2); color: var(--mid); }
.sheets-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--dim); transition: all 0.2s; }
.sheets-dot.ok { background: var(--green); box-shadow: 0 0 5px rgba(30,122,74,0.4); }
.btn-sm { padding: 7px 14px; background: var(--y); border: none; border-radius: 7px; font-family: var(--sans); font-size: 12px; font-weight: 700; color: #111; cursor: pointer; transition: opacity 0.15s; }
.btn-sm:hover { opacity: 0.85; }

/* ── CARDS & SECTIONS ── */
.section-title { font-family: var(--mono); font-size: 9px; letter-spacing: 0.16em; color: var(--dim); text-transform: uppercase; margin-bottom: 12px; }
.grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin-bottom: 20px; }
.grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 14px; margin-bottom: 20px; }
.card { background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: 16px; }
.stat-card { background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: 16px 18px; }
.stat-label { font-family: var(--mono); font-size: 10px; color: var(--dim); letter-spacing: 0.06em; margin-bottom: 6px; }
.stat-value { font-family: var(--sans); font-size: 28px; font-weight: 800; color: var(--text); line-height: 1; }
.stat-sub { font-family: var(--mono); font-size: 10px; color: var(--dim); margin-top: 4px; }
.stat-value.yellow { color: var(--yd); }
.stat-value.red { color: var(--red); }
.stat-value.green { color: var(--green); }

/* ── PROJECT LIST ── */
.project-list { display: flex; flex-direction: column; gap: 8px; }
.project-item { background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: 14px 16px; display: flex; align-items: center; gap: 14px; cursor: pointer; transition: all 0.15s; }
.project-item:hover { border-color: var(--border2); box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
.project-item.active-event { border-color: var(--ym); background: var(--yl); }
.project-color { width: 4px; height: 44px; border-radius: 2px; flex-shrink: 0; }
.project-info { flex: 1; min-width: 0; }
.project-name { font-family: var(--sans); font-size: 14px; font-weight: 700; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.project-meta { font-family: var(--mono); font-size: 10px; color: var(--dim); margin-top: 3px; }
.project-right { display: flex; flex-direction: column; align-items: flex-end; gap: 5px; flex-shrink: 0; }
.badge { font-family: var(--mono); font-size: 9px; padding: 2px 7px; border-radius: 4px; letter-spacing: 0.06em; }
.badge.prep { background: rgba(26,92,168,0.1); color: var(--blue); border: 1px solid rgba(26,92,168,0.2); }
.badge.active { background: var(--yl); color: var(--yd); border: 1px solid var(--ym); }
.badge.done { background: rgba(30,122,74,0.1); color: var(--green); border: 1px solid rgba(30,122,74,0.2); }
.badge.urgent { background: rgba(192,57,43,0.1); color: var(--red); border: 1px solid rgba(192,57,43,0.2); }
.pending-count { font-family: var(--mono); font-size: 10px; color: var(--dim); }
.pending-count span { color: var(--red); font-weight: 500; }

/* ── PENDENTES ── */
.pending-list { display: flex; flex-direction: column; gap: 6px; }
.pending-item { background: var(--card); border: 1px solid var(--border); border-radius: 8px; padding: 11px 14px; display: flex; align-items: flex-start; gap: 12px; }
.pending-item.resolved { opacity: 0.45; }
.check-box { width: 18px; height: 18px; border-radius: 4px; border: 1.5px solid var(--border2); flex-shrink: 0; margin-top: 1px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.15s; }
.check-box.checked { background: var(--green); border-color: var(--green); }
.check-box.checked::after { content: '✓'; color: white; font-size: 11px; }
.pending-body { flex: 1; min-width: 0; }
.pending-title { font-family: var(--sans); font-size: 13px; font-weight: 600; color: var(--text); }
.pending-detail { font-family: var(--mono); font-size: 10px; color: var(--dim); margin-top: 3px; line-height: 1.5; }
.pending-right { display: flex; flex-direction: column; align-items: flex-end; gap: 4px; flex-shrink: 0; }
.priority { font-family: var(--mono); font-size: 9px; padding: 2px 6px; border-radius: 4px; }
.priority.high { background: rgba(192,57,43,0.1); color: var(--red); border: 1px solid rgba(192,57,43,0.2); }
.priority.med { background: var(--yl); color: var(--yd); border: 1px solid var(--ym); }
.priority.low { background: rgba(0,0,0,0.04); color: var(--dim); border: 1px solid var(--border); }
.assigned { font-family: var(--mono); font-size: 9px; color: var(--dim); }
.deadline { font-family: var(--mono); font-size: 9px; color: var(--dim); }
.deadline.overdue { color: var(--red); }

/* ── TIMELINE EDITOR ── */
.timeline-editor { display: flex; flex-direction: column; gap: 6px; }
.tl-row { display: flex; gap: 8px; align-items: center; }
.tl-input-time { width: 72px; padding: 7px 10px; background: var(--bg); border: 1px solid var(--border); border-radius: 6px; font-family: var(--mono); font-size: 12px; color: var(--text); outline: none; }
.tl-input-time:focus { border-color: var(--ym); }
.tl-input-desc { flex: 1; padding: 7px 10px; background: var(--bg); border: 1px solid var(--border); border-radius: 6px; font-family: var(--mono); font-size: 12px; color: var(--text); outline: none; }
.tl-input-desc:focus { border-color: var(--ym); }
.tl-dept { width: 110px; padding: 7px 8px; background: var(--bg); border: 1px solid var(--border); border-radius: 6px; font-family: var(--mono); font-size: 11px; color: var(--text); outline: none; }
.tl-remove { width: 28px; height: 28px; background: none; border: 1px solid var(--border); border-radius: 6px; color: var(--dim); cursor: pointer; font-size: 14px; display: flex; align-items: center; justify-content: center; transition: all 0.15s; flex-shrink: 0; }
.tl-remove:hover { background: rgba(192,57,43,0.08); border-color: rgba(192,57,43,0.3); color: var(--red); }
.tl-add { padding: 7px 14px; background: none; border: 1px dashed var(--border2); border-radius: 6px; font-family: var(--mono); font-size: 11px; color: var(--dim); cursor: pointer; transition: all 0.15s; width: 100%; text-align: left; }
.tl-add:hover { border-color: var(--ym); color: var(--yd); background: var(--yl); }

/* ── FORM ── */
.field { margin-bottom: 14px; }
.field label { font-family: var(--mono); font-size: 10px; letter-spacing: 0.1em; color: var(--dim); text-transform: uppercase; display: block; margin-bottom: 5px; }
.field input, .field textarea, .field select { width: 100%; padding: 9px 12px; background: var(--bg); border: 1px solid var(--border); border-radius: 8px; font-family: var(--mono); font-size: 12px; color: var(--text); outline: none; transition: border-color 0.2s; }
.field input:focus, .field textarea:focus, .field select:focus { border-color: var(--ym); }
.field textarea { min-height: 80px; resize: vertical; line-height: 1.5; }
.field select { cursor: pointer; }

/* ── DOCS ── */
.doc-list { display: flex; flex-direction: column; gap: 6px; }
.doc-item { display: flex; align-items: center; gap: 12px; padding: 10px 14px; background: var(--card); border: 1px solid var(--border); border-radius: 8px; }
.doc-icon { width: 32px; height: 32px; border-radius: 6px; background: var(--yl); border: 1px solid var(--ym); display: flex; align-items: center; justify-content: center; font-size: 14px; flex-shrink: 0; }
.doc-info { flex: 1; }
.doc-name { font-family: var(--sans); font-size: 13px; font-weight: 600; color: var(--text); }
.doc-meta { font-family: var(--mono); font-size: 10px; color: var(--dim); margin-top: 2px; }
.doc-actions { display: flex; gap: 6px; }
.doc-btn { padding: 4px 10px; background: none; border: 1px solid var(--border); border-radius: 5px; font-family: var(--mono); font-size: 10px; color: var(--dim); cursor: pointer; transition: all 0.15s; }
.doc-btn:hover { border-color: var(--border2); color: var(--text); }
.doc-btn.primary { background: var(--y); border-color: var(--y); color: #111; font-weight: 500; }

/* ── MODAL ── */
  /* PENDING INLINE EDIT */
  .pending-item { position: relative; }
  .pending-item:hover [id^="pedit-"] { opacity: 1 !important; }
  .pending-item.editing { border-color:var(--ym); background:var(--yl); }
  .pending-item.editing [id^="pedit-"] { opacity:1 !important; background:var(--y) !important; border-color:var(--y) !important; color:#111 !important; }
  .pending-title-input { font-family:var(--sans); font-size:13px; font-weight:600; color:var(--text); border:none; background:transparent; outline:none; width:100%; padding:0; cursor:text; }
  .pending-title-input:hover { background:var(--bg); border-radius:3px; padding:1px 4px; margin:-1px -4px; }
  .pending-title-input:focus { background:var(--yl); border-radius:4px; padding:2px 6px; margin:-2px -6px; }
  .pending-detail-input { font-family:var(--mono); font-size:10px; color:var(--dim); border:none; background:transparent; outline:none; width:100%; padding:0; cursor:text; resize:none; line-height:1.5; min-height:16px; }
  .pending-detail-input:hover { background:var(--bg); border-radius:3px; padding:1px 4px; margin:-1px -4px; }
  .pending-detail-input:focus { background:var(--yl); border-radius:4px; padding:2px 6px; margin:-2px -6px; color:var(--text); }
  .pending-meta-edit { display:flex; gap:6px; align-items:center; flex-wrap:wrap; margin-top:4px; }
  .pending-meta-select { font-family:var(--mono); font-size:9px; color:var(--dim); border:1px solid var(--border); background:var(--bg); border-radius:4px; padding:2px 5px; cursor:pointer; outline:none; }
  .pending-meta-select:focus { border-color:var(--ym); }
  .pending-date-input { font-family:var(--mono); font-size:9px; color:var(--dim); border:1px solid var(--border); background:var(--bg); border-radius:4px; padding:2px 5px; cursor:pointer; outline:none; }
  .pending-date-input:focus { border-color:var(--ym); }
  .pending-resp-input { font-family:var(--mono); font-size:9px; color:var(--dim); border:1px solid var(--border); background:var(--bg); border-radius:4px; padding:2px 5px; outline:none; width:90px; }
  .pending-resp-input:focus { border-color:var(--ym); }
  .email-btn { display:inline-flex; align-items:center; gap:5px; padding:3px 9px; background:none; border:1px solid var(--border); border-radius:5px; font-family:var(--mono); font-size:9px; color:var(--dim); cursor:pointer; transition:all 0.15s; white-space:nowrap; margin-top:3px; }
  .email-btn:hover { border-color:rgba(26,92,168,0.4); color:var(--blue); background:rgba(26,92,168,0.06); }
  .email-btn.sent { border-color:rgba(30,122,74,0.3); color:var(--green); background:rgba(30,122,74,0.07); }
  .email-btn svg { width:11px; height:11px; flex-shrink:0; }
.modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 200; display: flex; align-items: center; justify-content: center; opacity: 0; pointer-events: none; transition: opacity 0.2s; }
.modal-overlay.show { opacity: 1; pointer-events: all; }
.modal { background: var(--card); border-radius: 14px; padding: 24px; width: 520px; max-width: 90vw; max-height: 80vh; overflow-y: auto; transform: translateY(8px); transition: transform 0.2s; }
.modal-overlay.show .modal { transform: translateY(0); }
.modal-title { font-family: var(--sans); font-size: 18px; font-weight: 800; margin-bottom: 4px; }
.modal-sub { font-family: var(--mono); font-size: 11px; color: var(--dim); margin-bottom: 20px; }
.modal-actions { display: flex; gap: 8px; margin-top: 20px; }
.btn-cancel { flex: 1; padding: 10px; background: none; border: 1px solid var(--border); border-radius: 8px; font-family: var(--mono); font-size: 12px; color: var(--dim); cursor: pointer; }
.btn-confirm { flex: 2; padding: 10px; background: var(--y); border: none; border-radius: 8px; font-family: var(--sans); font-size: 13px; font-weight: 700; color: #111; cursor: pointer; }

/* ── COPILOT LAUNCH ── */
.launch-card { background: #111; border-radius: 12px; padding: 20px; margin-bottom: 20px; display: flex; align-items: center; gap: 16px; }
.launch-icon { width: 44px; height: 44px; background: var(--y); border-radius: 10px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; font-size: 20px; }
.launch-info { flex: 1; }
.launch-title { font-family: var(--sans); font-size: 15px; font-weight: 700; color: #fff; }
.launch-sub { font-family: var(--mono); font-size: 10px; color: rgba(255,255,255,0.4); margin-top: 3px; }
.launch-btn { padding: 10px 18px; background: var(--y); border: none; border-radius: 8px; font-family: var(--sans); font-size: 13px; font-weight: 700; color: #111; cursor: pointer; white-space: nowrap; transition: opacity 0.15s; }
.launch-btn:hover { opacity: 0.9; }

/* ── SHEETS CONFIG ── */
.sheets-config { background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: 16px; margin-bottom: 20px; }
.sheets-config-title { font-family: var(--mono); font-size: 10px; color: var(--dim); letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 12px; }

/* ── EMPTY STATE ── */
.empty { text-align: center; padding: 40px 20px; font-family: var(--mono); font-size: 12px; color: var(--dim); line-height: 1.6; }

/* ── NOTIFICATION ── */
.notif { position: fixed; bottom: 24px; right: 24px; background: #111; color: #fff; font-family: var(--mono); font-size: 12px; padding: 12px 18px; border-radius: 8px; border-left: 3px solid var(--y); opacity: 0; transform: translateY(8px); transition: all 0.25s; z-index: 300; max-width: 300px; line-height: 1.4; }
.notif.show { opacity: 1; transform: translateY(0); }

  /* ── CLOCK PICKER ── */
  .clock-overlay { position:fixed; inset:0; z-index:500; display:none; }
  .clock-overlay.show { display:block; }
  .clock-picker {
    position:fixed; z-index:501; background:var(--card);
    border:1px solid var(--border2); border-radius:14px;
    box-shadow:0 8px 32px rgba(0,0,0,0.14);
    width:200px; padding:16px;
    display:none; flex-direction:column; align-items:center; gap:12px;
  }
  .clock-picker.show { display:flex; }
  .clock-display {
    font-family:var(--mono); font-size:36px; font-weight:500;
    color:var(--text); letter-spacing:0.04em; line-height:1;
    display:flex; align-items:center; gap:6px;
  }
  .clock-sep { color:var(--dim); }
  .clock-col { display:flex; flex-direction:column; align-items:center; gap:0; }
  .clock-val {
    font-family:var(--mono); font-size:40px; font-weight:400;
    color:var(--text); min-width:56px; text-align:center;
    padding:6px 0; cursor:ns-resize; user-select:none;
    border-radius:8px; transition:background 0.1s;
    letter-spacing:0.02em;
  }
  .clock-val:hover { background:var(--yl); }
  .clock-arrow {
    font-size:14px; color:var(--dim); cursor:pointer; padding:4px 12px;
    border-radius:6px; transition:all 0.15s; line-height:1;
    user-select:none;
  }
  .clock-arrow:hover { background:var(--y); color:#111; }
  .clock-label { font-family:var(--mono); font-size:9px; color:var(--dim); letter-spacing:0.1em; text-transform:uppercase; }
  .clock-confirm {
    width:100%; padding:9px; background:var(--y); border:none;
    border-radius:8px; font-family:var(--sans); font-size:13px;
    font-weight:700; color:#111; cursor:pointer; transition:opacity 0.15s;
  }
  .clock-confirm:hover { opacity:0.88; }
  .clock-cols { display:flex; align-items:center; gap:4px; }
</style>
</head>

    { id: 3, name: 'Conferência Deloitte', client: 'Deloitte Portugal', venue: 'Centro de Congressos Lisboa', date: '2026-03-01', status: 'done', color: '#1E7A4A', team: '', protocols: '' },

}

if (state.tarefas.length === 0) {

    { id: 1, projectId: 1, title: 'Confirmar rider técnico de som com cliente', detail: 'Cliente DHL ainda não enviou especificações do sistema de som preferido', responsible: 'Bruno D.', deadline: '2026-04-05', priority: 'high', done: false },
    { id: 2, projectId: 1, title: 'Alojamento equipa — 3 quartos por confirmar', detail: 'Hotel Tivoli confirmou 5/8 quartos. Faltam 3 para técnicos de estruturas', responsible: 'Bruno D.', deadline: '2026-04-07', priority: 'high', done: false },
    { id: 3, projectId: 1, title: 'Layouts de palco aprovados pelo cliente', detail: 'Versão 3 do layout enviada a 25/03. Aguardar aprovação formal por email', responsible: 'Bruno D.', deadline: '2026-04-06', priority: 'high', done: false },
    { id: 4, projectId: 1, title: 'Confirmação de acesso para manitou', detail: 'Hotel precisa de autorização municipal para entrada de manitou pela varanda', responsible: 'Filipa L.', deadline: '2026-04-08', priority: 'med', done: false },
    { id: 5, projectId: 1, title: 'Seguro de responsabilidade civil evento', detail: 'Apólice para DHL event submetida, aguardar confirmação seguradora', responsible: 'Adm.', deadline: '2026-04-09', priority: 'med', done: false },
    { id: 6, projectId: 1, title: 'Plano de refeições equipa montagem', detail: 'Coordenar com hotel horários e local de refeições equipa 10 Abril', responsible: 'Bruno D.', deadline: '2026-04-08', priority: 'low', done: false },
    { id: 7, projectId: 2, title: 'Proposta de cenografia enviada', detail: 'Aguardar aprovação do departamento de marketing Millennium', responsible: 'Comercial', deadline: '2026-04-15', priority: 'med', done: false },
  ];

if (state.timeline.length === 0) {
  state.timeline = [
    { id: 1, projectId: 1, time: '07:00', desc: 'Chegada de equipa e briefing de segurança', dept: 'Todos' },
    { id: 2, projectId: 1, time: '08:00', desc: 'Descarga de camiões (EPI obrigatórios)', dept: 'Estruturas' },

// ── PERSISTENCE ───────────────────────────────────────────────────────────────
function saveProjects() { localStorage.setItem('ep-projects', JSON.stringify(state.projects)); }
function saveTarefas() { localStorage.setItem('ep-tarefas', JSON.stringify(state.tarefas)); }
function saveTimeline() { localStorage.setItem('ep-timeline', JSON.stringify(state.timeline)); }

// ── NAVIGATION ────────────────────────────────────────────────────────────────
function showView(view, projectId = null) {
  state.currentView = view;
  if (projectId) state.currentProject = projectId;
  document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
  const navEl = document.getElementById('nav-' + view);
  if (navEl) navEl.classList.add('active');
  const titles = { dashboard:'Dashboard', projects:'Projetos', tarefas:'Tarefas', timeline:'Timeline', docs:'Documentos', config:'Google Sheets' };
  document.getElementById('topbar-title').textContent = titles[view] || view;
  const content = document.getElementById('content');
  content.innerHTML = '';
  if (view === 'dashboard') renderDashboard();
  else if (view === 'projects') renderProjects();
  else if (view === 'tarefas') renderTarefas(projectId);
  else if (view === 'timeline') renderTimeline(projectId);
  else if (view === 'docs') renderDocs(projectId);
  else if (view === 'config') renderConfig();
  // Auto-resize textareas (runs after any view)
  requestAnimationFrame(() => {
    document.querySelectorAll('.pending-detail-input').forEach(ta => {
      ta.style.height = 'auto';
      ta.style.height = ta.scrollHeight + 'px';
    });
  });
}

// ── DASHBOARD ─────────────────────────────────────────────────────────────────
function renderDashboard() {
  const c = document.getElementById('content');
  const activeProject = state.projects.find(p => p.status === 'active');
  const totalPending = state.tarefas.filter(p => !p.done).length;
  const highPending = state.tarefas.filter(p => !p.done && p.priority === 'high').length;
  const overdue = state.tarefas.filter(p => !p.done && new Date(p.deadline) < new Date()).length;

  c.innerHTML = `
    ${activeProject ? `
    <div class="launch-card">
      <div class="launch-icon">◈</div>
      <div class="launch-info">
        <div class="launch-title">${activeProject.name}</div>
        <div class="launch-sub">${activeProject.venue} · ${formatDate(activeProject.date)} · ${state.tarefas.filter(p=>p.projectId===activeProject.id&&!p.done).length} tarefas em aberto</div>
      </div>
      <button class="launch-btn" onclick="launchCopilot()">▶ Lançar Co-piloto</button>
    </div>` : ''}

    <div class="section-title">Visão geral</div>
    <div class="grid-3">
      <div class="stat-card">
        <div class="stat-label">Projetos ativos</div>
        <div class="stat-value">${state.projects.filter(p=>p.status==='active').length}</div>
        <div class="stat-sub">${state.projects.length} no total</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Tarefas em aberto</div>
        <div class="stat-value ${highPending > 0 ? 'red' : 'yellow'}">${totalPending}</div>
        <div class="stat-sub">${highPending} de alta prioridade</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Em atraso</div>
        <div class="stat-value ${overdue > 0 ? 'red' : 'green'}">${overdue}</div>
        <div class="stat-sub">${overdue > 0 ? 'requerem atenção imediata' : 'tudo dentro do prazo'}</div>
      </div>
    </div>

    <div class="section-title">Próximos eventos</div>
    <div class="project-list">
      ${state.projects.filter(p=>p.status!=='done').sort((a,b)=>new Date(a.date)-new Date(b.date)).map(p => projectCard(p)).join('')}
    </div>

    ${totalPending > 0 ? `
    <div style="margin-top:20px">
      <div class="section-title">Tarefas urgentes</div>
      <div class="pending-list">
        ${state.tarefas.filter(p=>!p.done && p.priority==='high').slice(0,4).map(p => pendingItem(p)).join('')}
      </div>
      ${totalPending > 4 ? `<div style="text-align:center;margin-top:10px"><span onclick="showView('tarefas')" style="font-family:var(--mono);font-size:11px;color:var(--yd);cursor:pointer">Ver todos os tarefas →</span></div>` : ''}
    </div>` : ''}
  `;
}

function projectCard(p) {
  const pends = state.tarefas.filter(x=>x.projectId===p.id&&!x.done).length;
  const highP = state.tarefas.filter(x=>x.projectId===p.id&&!x.done&&x.priority==='high').length;
  const statusLabels = { prep:'em preparação', active:'em curso', done:'concluído' };
  const statusClass = { prep:'prep', active:'active', done:'done' };
  return `<div class="project-item ${p.status==='active'?'active-event':''}" onclick="showView('tarefas',${p.id})">
    <div class="project-color" style="background:${p.color}"></div>
    <div class="project-info">
      <div class="project-name">${p.name}</div>
      <div class="project-meta">${p.client} · ${p.venue} · ${formatDate(p.date)}</div>
    </div>
    <div class="project-right">
      <span class="badge ${statusClass[p.status]}">${statusLabels[p.status]}</span>
      <span class="pending-count">${pends > 0 ? `<span>${pends} tarefas${highP>0?' ('+highP+' urgentes)':''}</span>` : '✓ tudo ok'}</span>
    </div>
  </div>`;
}

// ── PROJECTS ──────────────────────────────────────────────────────────────────
function renderProjects() {
  const c = document.getElementById('content');
  c.innerHTML = `
    <div class="section-title">Todos os projetos</div>
    <div class="project-list" style="margin-bottom:20px">
      ${state.projects.map(p => projectCard(p)).join('')}
    </div>
  `;
}

// ── PENDENTES ─────────────────────────────────────────────────────────────────
function renderTarefas(projectId) {
  const c = document.getElementById('content');
  const proj = projectId ? state.projects.find(p=>p.id===projectId) : null;
  const pends = projectId
    ? state.tarefas.filter(p=>p.projectId===projectId)
    : state.tarefas;
  const open = pends.filter(p=>!p.done);
  const done = pends.filter(p=>p.done);

  c.innerHTML = `
    ${proj ? `<div style="display:flex;align-items:center;gap:10px;margin-bottom:16px">
      <div style="width:4px;height:24px;border-radius:2px;background:${proj.color}"></div>
      <div>
        <div style="font-family:var(--sans);font-size:15px;font-weight:700">${proj.name}</div>
        <div style="font-family:var(--mono);font-size:10px;color:var(--dim)">${proj.venue} · ${formatDate(proj.date)}</div>
      </div>
      <button onclick="launchCopilot(${proj.id})" style="margin-left:auto;padding:7px 14px;background:var(--y);border:none;border-radius:7px;font-family:var(--sans);font-size:12px;font-weight:700;color:#111;cursor:pointer">▶ Co-piloto</button>
    </div>` : ''}

    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px">
      <div class="section-title" style="margin-bottom:0">Tarefas em aberto (${open.length})</div>
      <button class="btn-sm" onclick="showNewPendingModal(${projectId||1})" style="font-size:11px;padding:5px 12px">+ Adicionar</button>
    </div>
    <div class="pending-list" style="margin-bottom:20px">
      ${open.length > 0 ? open.map(p => pendingItem(p)).join('') : '<div class="empty">Sem tarefas em aberto.<br>Tudo em ordem! ✓</div>'}
    </div>
    ${done.length > 0 ? `
    <div class="section-title">Resolvidos (${done.length})</div>
    <div class="pending-list">
      ${done.map(p => pendingItem(p)).join('')}
    </div>` : ''}
  `;
}

function pendingItem(p) {
  const proj = state.projects.find(x=>x.id===p.projectId);
  const isOverdue = !p.done && new Date(p.deadline) < new Date();
  const emailSent = sentEmails.has(p.id);
  const projLabel = proj && !state.currentProject ? `<span style="color:var(--yd);font-family:var(--mono);font-size:10px">${proj.name}</span>` : '';
  const priorityOpts = ['high','med','low'].map(v =>
    `<option value="${v}" ${p.priority===v?'selected':''}>${v==='high'?'urgente':v==='med'?'médio':'baixo'}</option>`
  ).join('');

  return `<div class="pending-item ${p.done?'resolved':''}">
    <div class="check-box ${p.done?'checked':''}" onclick="togglePending(${p.id})"></div>
    <div class="pending-body" style="flex:1;min-width:0">
      <input class="pending-title-input" id="pti-${p.id}" value="${p.title.replace(/"/g,'&quot;')}"
        readonly style="cursor:default;pointer-events:none"
        onchange="updatePendingField(${p.id},'title',this.value)"
        onblur="updatePendingField(${p.id},'title',this.value)">
      <textarea class="pending-detail-input" id="pdi-${p.id}" rows="1"
        readonly style="cursor:default;pointer-events:none"
        onchange="updatePendingField(${p.id},'detail',this.value)"
        onblur="updatePendingField(${p.id},'detail',this.value)"
        oninput="this.style.height='auto';this.style.height=this.scrollHeight+'px'"
        >${p.detail||''}</textarea>
      ${projLabel ? `<div style="margin-top:3px">${projLabel}</div>` : ''}
      <div style="font-family:var(--mono);font-size:9px;color:var(--dim);margin-top:3px" id="pmeta-read-${p.id}">${p.responsible}${p.deadline?' · '+formatDate(p.deadline):''}</div>
      ${!p.done ? `<div class="pending-meta-edit" id="pmeta-${p.id}" style="display:none;pointer-events:none">
        <select class="pending-meta-select" id="ppri-${p.id}" disabled onchange="updatePendingField(${p.id},'priority',this.value);renderView()"
          title="Prioridade">${priorityOpts}</select>
        <input class="pending-resp-input" id="presp-${p.id}" value="${p.responsible||''}" placeholder="responsável"
          readonly style="pointer-events:none"
          title="Responsável" onblur="updatePendingField(${p.id},'responsible',this.value)">
        <input class="pending-date-input" id="pdate-${p.id}" type="date" value="${p.deadline||''}"
          disabled title="Prazo" onchange="updatePendingField(${p.id},'deadline',this.value)">
      </div>` : ''}
    </div>
    <div class="pending-right" style="flex-shrink:0;align-items:flex-end;gap:4px">
      <span class="priority ${p.priority}" id="ppill-${p.id}">${p.priority==='high'?'urgente':p.priority==='med'?'médio':'baixo'}</span>
      ${!p.done ? `<button id="pedit-${p.id}" onclick="event.stopPropagation();togglePendingEdit(${p.id})" title="Editar" style="width:22px;height:22px;background:none;border:1px solid var(--border);border-radius:5px;font-size:11px;color:var(--dim);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all 0.15s;flex-shrink:0;opacity:0;margin-left:2px" onmouseenter="this.style.opacity=1" onmouseleave="if(!this.closest('.editing'))this.style.opacity=0">✎</button>` : ''}
      ${!p.done ? `<button class="email-btn ${emailSent?'sent':''}" onclick="event.stopPropagation();sendPendingEmail(${p.id})" title="Notificar por email">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,12 2,6"/></svg>
        ${emailSent?'enviado':'notificar'}
      </button>` : ''}
    </div>
    ${!p.done ? `<button class="pending-edit-btn" id="pedit-${p.id}" onclick="event.stopPropagation();togglePendingEdit(${p.id})" title="Editar">✎</button>` : ''}
  </div>`;
}


function togglePending(id) {
  const p = state.tarefas.find(x=>x.id===id);
  if (p) { p.done = !p.done; saveTarefas(); showView(state.currentView, state.currentProject); notify(p.done ? '✓ Tarefa resolvida' : 'Tarefa reaberta'); }
}

// ── TIMELINE ──────────────────────────────────────────────────────────────────
function renderTimeline(projectId) {
  const c = document.getElementById('content');
  const pid = projectId || (state.projects.find(p=>p.status==='active')?.id) || state.projects[0]?.id;
  const proj = state.projects.find(p=>p.id===pid);
  const tl = state.timeline.filter(t=>t.projectId===pid);

  c.innerHTML = `
    ${proj ? `<div style="display:flex;align-items:center;gap:10px;margin-bottom:16px">
      <div style="width:4px;height:24px;border-radius:2px;background:${proj.color}"></div>
      <div style="font-family:var(--sans);font-size:15px;font-weight:700">${proj.name}</div>
      <div class="field" style="margin:0 0 0 auto;display:flex;gap:6px;align-items:center">
        <label style="font-family:var(--mono);font-size:10px;color:var(--dim);white-space:nowrap">Projeto:</label>
        <select onchange="renderTimeline(parseInt(this.value));state.currentProject=parseInt(this.value)" style="padding:5px 8px;background:var(--bg);border:1px solid var(--border);border-radius:6px;font-family:var(--mono);font-size:11px;color:var(--text)">
          ${state.projects.map(p=>`<option value="${p.id}" ${p.id===pid?'selected':''}>${p.name}</option>`).join('')}
        </select>
      </div>
    </div>` : ''}

    <div style="display:flex;gap:8px;margin-bottom:12px">
      <div class="section-title" style="margin-bottom:0;flex:1">Timeline do evento</div>
      <button class="btn-sm" onclick="saveTLAndNotify()" style="font-size:11px;padding:5px 12px">Guardar</button>
    </div>

    <div class="card">
      <div class="timeline-editor" id="tl-editor">
        ${tl.map(t => tlRow(t)).join('')}
      </div>
      <button class="tl-add" style="margin-top:8px" onclick="addTLRow(${pid})">+ Adicionar momento</button>
    </div>

    <div style="margin-top:14px;padding:12px 14px;background:var(--yl);border:1px solid var(--ym);border-radius:8px;font-family:var(--mono);font-size:11px;color:var(--yd);line-height:1.6">
      ◈ Esta timeline é transferida automaticamente para o Co-piloto. Clica na hora para abrir o relógio. Ao guardar, os momentos são ordenados por data e hora.
    </div>
  `;

function tlRow(t) {

// ── DOCUMENT STORAGE (IndexedDB) ──────────────────────────────────────────────
let docDB = null;

function openDocDB() {
  return new Promise((resolve, reject) => {
    if (docDB) { resolve(docDB); return; }
    const req = indexedDB.open('ep-docs', 1);
    req.onupgradeneeded = e => {
      const db = e.target.result;
      if (!db.objectStoreNames.contains('docs')) {
        db.createObjectStore('docs', { keyPath: 'id' });
      }
    };
    req.onsuccess = e => { docDB = e.target.result; resolve(docDB); };
    req.onerror = () => reject(req.error);
  });
}

async function saveDocToDB(doc) {
  const db = await openDocDB();
  return new Promise((resolve, reject) => {
    const tx = db.transaction('docs', 'readwrite');
    tx.objectStore('docs').put(doc);
    tx.oncomplete = resolve;
    tx.onerror = () => reject(tx.error);
  });
}

async function getDocFromDB(id) {
  const db = await openDocDB();
  return new Promise((resolve, reject) => {
    const tx = db.transaction('docs', 'readonly');
    const req = tx.objectStore('docs').get(id);
    req.onsuccess = () => resolve(req.result);
    req.onerror = () => reject(req.error);
  });
}

async function deleteDocFromDB(id) {
  const db = await openDocDB();
  return new Promise((resolve, reject) => {
    const tx = db.transaction('docs', 'readwrite');
    tx.objectStore('docs').delete(id);
    tx.oncomplete = resolve;
    tx.onerror = () => reject(tx.error);
  });
}

// Doc metadata stored in localStorage (without file data)
function getDocMeta() {
  return JSON.parse(localStorage.getItem('ep-doc-meta') || '[]');
}
function saveDocMeta(meta) {
  localStorage.setItem('ep-doc-meta', JSON.stringify(meta));
}
function getDocsForProject(pid) {
  return getDocMeta().filter(d => d.projectId === pid);
}

async function handleFileInput(event, projectId) {
  const files = Array.from(event.target.files);
  await processFiles(files, projectId);
  event.target.value = '';
}

async function handleFileDrop(event, projectId) {
  const files = Array.from(event.dataTransfer.files);
  await processFiles(files, projectId);
}

async function processFiles(files, projectId) {
  if (files.length === 0) return;
  notify(`A importar ${files.length} ficheiro${files.length>1?'s':''}...`);

  for (const file of files) {
    const allowed = ['pdf','docx','xlsx','jpg','jpeg','png'];
    const ext = file.name.split('.').pop().toLowerCase();
    if (!allowed.includes(ext)) { notify(`Tipo não suportado: ${ext}`); continue; }

    const id = 'doc-' + Date.now() + '-' + Math.random().toString(36).slice(2);
    const reader = new FileReader();

    await new Promise(resolve => {
      reader.onload = async (e) => {
        const doc = {
          id, projectId, name: file.name, size: file.size,
          type: file.type, ext, uploadedAt: Date.now(),
          data: e.target.result, note: ''
        };
        await saveDocToDB(doc);
        // Save metadata (without data)
        const meta = getDocMeta();
        meta.push({ id, projectId, name: file.name, size: file.size, type: file.type, ext, uploadedAt: Date.now(), note: '' });
        saveDocMeta(meta);
        resolve();
      };
      reader.readAsDataURL(file);
    });
  }

  notify(`✓ ${files.length} ficheiro${files.length>1?'s importados':'importado'}`);
  showView('docs', projectId);
}

async function viewPDF(id) {

async function downloadDoc(id) {
  const doc = await getDocFromDB(id);
  if (!doc) { notify('Ficheiro não encontrado'); return; }
  const a = document.createElement('a');
  a.href = doc.data;
  a.download = doc.name;
  a.click();
}

async function shareDoc(id) {
  const meta = getDocMeta().find(d => d.id === id);
  if (!meta) return;
  // Copy filename to clipboard as share info
  const text = `Documento: ${meta.name} — partilhado via Europalco Gestão de Projetos`;
  try {
    await navigator.clipboard.writeText(text);
    notify('✓ Info copiada para a área de transferência');
  } catch(e) {
    notify('Nome do ficheiro: ' + meta.name);
  }
}

async function deleteDoc(id, projectId) {
  if (!confirm('Eliminar este documento?')) return;
  await deleteDocFromDB(id);
  const meta = getDocMeta().filter(d => d.id !== id);
  saveDocMeta(meta);
  notify('Documento eliminado');
  showView('docs', projectId);
}

function launchCopilot(projectId) {
  const pid = projectId || state.projects.find(p=>p.status==='active')?.id || state.projects[0]?.id;
  const proj = state.projects.find(p=>p.id===pid);
  if (!proj) { notify('Nenhum projeto selecionado'); return; }

  const tl = state.timeline.filter(t=>t.projectId===pid)
    .sort((a,b)=>a.time.localeCompare(b.time))
    .map(t=>`${t.time} — ${t.desc}`)
    .join('\n');

  const openPends = state.tarefas.filter(p=>p.projectId===pid && !p.done)
    .map(p=>`[${p.priority.toUpperCase()}] ${p.title} (resp: ${p.responsible}, prazo: ${formatDate(p.deadline)})`)
    .join('\n');

  // Build copilot URL with all context encoded
  const ctx = {
    name: proj.name,
    venue: proj.venue,
    date: formatDate(proj.date),
    timeline: tl,
    team: proj.team,
    protocols: proj.protocols,
    tarefas: openPends,
  };

  const encoded = btoa(encodeURIComponent(JSON.stringify(ctx)));
  const copilotUrl = `https://brunodomingos-maker.github.io/copiloto-europalco/?ctx=${encoded}`;

  // Show modal with launch options
  document.getElementById('modal-title').textContent = 'Lançar Co-piloto';
  document.getElementById('modal-sub').textContent = `${proj.name} · ${openPends ? state.tarefas.filter(p=>p.projectId===pid&&!p.done).length + ' tarefas em aberto' : 'sem tarefas'}`;
  document.getElementById('modal-body').innerHTML = `
    <div style="background:var(--bg);border-radius:8px;padding:12px;font-family:var(--mono);font-size:11px;color:var(--mid);line-height:1.7;margin-bottom:14px">
      <strong style="color:var(--text)">O co-piloto vai receber:</strong><br>
      ✓ Timeline com ${state.timeline.filter(t=>t.projectId===pid).length} momentos<br>
      ✓ Equipa e contactos<br>
      ✓ Protocolos e regras de segurança<br>
      ${openPends ? `⚠ ${state.tarefas.filter(p=>p.projectId===pid&&!p.done).length} tarefas ainda em aberto` : '✓ Sem tarefas em aberto'}
    </div>
    <div style="font-family:var(--mono);font-size:10px;color:var(--dim)">O co-piloto abre numa nova janela/tab com todo o contexto pré-carregado.</div>
  `;
  document.getElementById('modal-confirm').textContent = '▶ Abrir Co-piloto';
  state.modalAction = () => { window.open(copilotUrl, '_blank'); closeModal(); };
  document.getElementById('modal').classList.add('show');
}

function formatDate(d) {
  if (!d) return '—';
  const dt = new Date(d + 'T00:00:00');
  return dt.toLocaleDateString('pt-PT', { day:'2-digit', month:'short', year:'numeric' });
}

function notify(msg) {
  const n = document.getElementById('notif');
  n.textContent = msg; n.classList.add('show');
  setTimeout(() => n.classList.remove('show'), 2800);
}

// ── PENDING INLINE EDIT ──────────────────────────────────────────────────────
let editingPendingId = null;

function togglePendingEdit(id) {
  // If another item is being edited, save and close it first
  if (editingPendingId && editingPendingId !== id) savePendingEdit(editingPendingId);

  const card = document.getElementById('pi-' + id) || document.querySelector(`[data-pid="${id}"]`);
  const isEditing = editingPendingId === id;

  if (isEditing) {
    savePendingEdit(id);
  } else {
    editingPendingId = id;
    enablePendingEdit(id, true);
  }
}

function enablePendingEdit(id, enable) {
  const ti = document.getElementById('pti-' + id);
  const di = document.getElementById('pdi-' + id);
  const meta = document.getElementById('pmeta-' + id);
  const pri = document.getElementById('ppri-' + id);
  const resp = document.getElementById('presp-' + id);
  const date = document.getElementById('pdate-' + id);
  const editBtn = document.getElementById('pedit-' + id);
  // Find the card by looking for the parent pending-item
  const allCards = document.querySelectorAll('.pending-item');
  let card = null;
  allCards.forEach(c => { if (c.querySelector('#pti-' + id)) card = c; });

  const readLabel = document.getElementById('pmeta-read-' + id);
  if (enable) {
    if (ti) { ti.removeAttribute('readonly'); ti.style.cursor = 'text'; ti.style.pointerEvents = 'auto'; ti.focus(); ti.select(); }
    if (di) { di.removeAttribute('readonly'); di.style.cursor = 'text'; di.style.pointerEvents = 'auto'; }
    if (meta) { meta.style.display = 'flex'; meta.style.pointerEvents = 'auto'; }
    if (readLabel) readLabel.style.display = 'none';
    if (pri) pri.disabled = false;
    if (resp) { resp.removeAttribute('readonly'); resp.style.pointerEvents = 'auto'; }
    if (date) date.disabled = false;
    if (editBtn) { editBtn.textContent = '✓'; editBtn.title = 'Guardar'; editBtn.style.display = 'flex'; }
    if (card) card.classList.add('editing');
  } else {
    if (ti) { ti.setAttribute('readonly',''); ti.style.cursor = 'default'; ti.style.pointerEvents = 'none'; }
    if (di) { di.setAttribute('readonly',''); di.style.cursor = 'default'; di.style.pointerEvents = 'none'; }
    if (meta) { meta.style.display = 'none'; meta.style.pointerEvents = 'none'; }
    if (readLabel) readLabel.style.display = 'block';
    if (pri) pri.disabled = true;
    if (resp) { resp.setAttribute('readonly',''); resp.style.pointerEvents = 'none'; }
    if (date) date.disabled = true;
    if (editBtn) { editBtn.textContent = '✎'; editBtn.title = 'Editar'; }
    if (card) card.classList.remove('editing');
  }
}

function savePendingEdit(id) {
  const ti = document.getElementById('pti-' + id);
  const di = document.getElementById('pdi-' + id);
  const pri = document.getElementById('ppri-' + id);
  const resp = document.getElementById('presp-' + id);
  const date = document.getElementById('pdate-' + id);

  const p = state.tarefas.find(x => x.id === id);
  if (p) {
    if (ti) p.title = ti.value;
    if (di) p.detail = di.value;
    if (pri) p.priority = pri.value;
    if (resp) p.responsible = resp.value;
    if (date) p.deadline = date.value;
    saveTarefas();
  }

  editingPendingId = null;
  enablePendingEdit(id, false);

  // Update priority pill without full re-render
  const pill = document.getElementById('ppill-' + id);
  if (pill && p) {
    pill.className = `priority ${p.priority}`;
    pill.textContent = p.priority==='high'?'urgente':p.priority==='med'?'médio':'baixo';
  }
  renderStats();
  notify('✓ Tarefa guardada');
}

function updatePendingField(id, field, value) {
  const p = state.tarefas.find(x => x.id === id);
  if (!p || p[field] === value) return;
  p[field] = value;
  saveTarefas();
  // Re-render stats silently (no full re-render to preserve focus)
  renderStats && renderStats();
}

function renderView() {
  showView(state.currentView, state.currentProject);
}

// ── EMAIL NOTIFICATIONS (Gmail via Claude MCP) ───────────────────────────────
const sentEmails = new Set(JSON.parse(localStorage.getItem('ep-sent-emails') || '[]'));

function saveSentEmails() {
  localStorage.setItem('ep-sent-emails', JSON.stringify([...sentEmails]));
}

// Email address book — maps responsible names to emails
let emailBook = JSON.parse(localStorage.getItem('ep-email-book') || '{}');
function saveEmailBook() { localStorage.setItem('ep-email-book', JSON.stringify(emailBook)); }

function getEmailForResponsible(name) {
  // Check email book first
  if (emailBook[name]) return emailBook[name];
  // Try to find in tecnicos (from equipa page)
  const stored = localStorage.getItem('ep-tecnicos');
  if (stored) {
    const tecnicos = JSON.parse(stored);
    const match = tecnicos.find(t => t.name.toLowerCase().includes(name.toLowerCase()) || name.toLowerCase().includes(t.name.split(' ')[0].toLowerCase()));
    if (match?.email) return match.email;
  }
  return null;
}

async function sendPendingEmail(pendingId, auto = false) {
  const p = state.tarefas.find(x => x.id === pendingId);
  if (!p) return;
  const proj = state.projects.find(x => x.id === p.projectId);

  // Get or ask for email
  let toEmail = getEmailForResponsible(p.responsible);
  if (!toEmail) {
    toEmail = prompt(`Email de ${p.responsible}:`);
    if (!toEmail || !toEmail.includes('@')) { notify('Email inválido'); return; }
    emailBook[p.responsible] = toEmail;
    saveEmailBook();
  }

  const priorityLabel = p.priority === 'high' ? '🔴 URGENTE' : p.priority === 'med' ? '🟡 Médio' : '🟢 Baixo';
  const subject = `[Europalco] Tarefa ${p.priority === 'high' ? 'URGENTE' : ''}: ${p.title}`;
  const body = `Olá ${p.responsible.split(' ')[0]},

Existe um tarefa que necessita da tua atenção${p.priority === 'high' ? ' com carácter urgente' : ''}:

━━━━━━━━━━━━━━━━━━━━━━━━
${priorityLabel} — ${p.title}
━━━━━━━━━━━━━━━━━━━━━━━━

Projeto: ${proj?.name || '—'}
Local: ${proj?.venue || '—'}
Data do evento: ${proj?.date ? formatDate(proj.date) : '—'}

Descrição:
${p.detail || '(sem detalhe adicional)'}

Prazo: ${p.deadline ? formatDate(p.deadline) : '—'}
Responsável: ${p.responsible}

Por favor confirma que tomaste conhecimento e trata deste ponto o mais brevemente possível.

━━━━━━━━━━━━━━━━━━━━━━━━
Gestão de Projetos — Europalco
Esta mensagem foi enviada automaticamente pela plataforma de gestão de projetos.`;

  // Send via Gmail MCP
  notify('A enviar email...');
  try {
    const response = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1000,
        mcp_servers: [{ type: 'url', url: 'https://gmail.mcp.claude.com/mcp', name: 'gmail' }],
        system: 'És um assistente que envia emails via Gmail. Quando pedido, envia o email exactamente como especificado sem alterações. Confirma apenas com "Email enviado com sucesso."',
        messages: [{
          role: 'user',
          content: `Envia um email com os seguintes dados:
Para: ${toEmail}
Assunto: ${subject}
Corpo:
${body}`
        }]
      })
    });

    if (response.ok) {
      sentEmails.add(pendingId);
      saveSentEmails();
      notify(`✓ Email enviado para ${p.responsible} (${toEmail})`);
      showView(state.currentView, state.currentProject);
    } else {
      // Fallback: open mailto
      fallbackMailto(toEmail, subject, body, pendingId, p.responsible);
    }
  } catch(e) {
    // Fallback: open mailto link
    fallbackMailto(toEmail, subject, body, pendingId, p.responsible);
  }
}

function fallbackMailto(toEmail, subject, body, pendingId, responsible) {
  const mailto = `mailto:${toEmail}?subject=${encodeURIComponent(subject)}&body=${encodeURIComponent(body)}`;
  window.open(mailto, '_blank');
  sentEmails.add(pendingId);
  saveSentEmails();
  notify(`✓ Email preparado para ${responsible}`);
  showView(state.currentView, state.currentProject);
}

// Auto-send when urgent pending is created
const originalConfirmModal = window.confirmModal;
function checkAutoEmail(pendingId) {
  const p = state.tarefas.find(x => x.id === pendingId);
  if (p && p.priority === 'high' && !sentEmails.has(pendingId)) {
    const toEmail = getEmailForResponsible(p.responsible);
    if (toEmail) {
      setTimeout(() => sendPendingEmail(pendingId, true), 500);
    } else {
      // Ask if they want to send
      setTimeout(() => {
        const send = confirm(`Tarefa urgente criado.
Enviar notificação por email a ${p.responsible}?`);
        if (send) sendPendingEmail(pendingId, true);
      }, 300);
    }
  }
}

<!-- CLOCK PICKER -->
<div class="clock-overlay" id="clock-overlay" onclick="closeClock()"></div>
<div class="clock-picker" id="clock-picker">
  <div class="clock-label">Seleccionar hora</div>
  <div class="clock-cols">
    <div class="clock-col">
      <div class="clock-arrow" onclick="changeHour(1)">▲</div>
      <div class="clock-val" id="clock-h" onwheel="onWheelHour(event)">00</div>
      <div class="clock-arrow" onclick="changeHour(-1)">▼</div>
    </div>
    <div class="clock-sep" style="font-size:32px;font-weight:500;color:var(--text);padding-bottom:4px">:</div>
    <div class="clock-col">
      <div class="clock-arrow" onclick="changeMin(1)">▲</div>
      <div class="clock-val" id="clock-m" onwheel="onWheelMin(event)">00</div>
      <div class="clock-arrow" onclick="changeMin(-1)">▼</div>
    </div>
  </div>
  <button class="clock-confirm" onclick="confirmClock()">Confirmar</button>
</div>

<script>
// ── CLOCK PICKER ──────────────────────────────────────────────────────────────
let clockH = 0, clockM = 0, clockTargetId = null, clockCallback = null;

function openClock(inputEl, tlId) {
  const val = inputEl.value || '00:00';
  const parts = val.split(':');
  clockH = parseInt(parts[0]) || 0;
  clockM = parseInt(parts[1]) || 0;
  clockTargetId = tlId;
  clockCallback = (time) => {
    inputEl.value = time;
    updateTL(tlId, 'time', time);
  };
  renderClock();

  // Position picker near the input
  const rect = inputEl.getBoundingClientRect();
  const picker = document.getElementById('clock-picker');
  let top = rect.bottom + 6;
  let left = rect.left;
  if (left + 200 > window.innerWidth) left = window.innerWidth - 210;
  if (top + 220 > window.innerHeight) top = rect.top - 226;
  picker.style.top = top + 'px';
  picker.style.left = left + 'px';

  document.getElementById('clock-overlay').classList.add('show');
  picker.classList.add('show');
}

function closeClock() {
  document.getElementById('clock-overlay').classList.remove('show');
  document.getElementById('clock-picker').classList.remove('show');
  clockCallback = null;
}

function renderClock() {
  document.getElementById('clock-h').textContent = String(clockH).padStart(2,'0');
  document.getElementById('clock-m').textContent = String(clockM).padStart(2,'0');
}

function changeHour(delta) {
  clockH = ((clockH + delta) + 24) % 24;
  renderClock();
}

function changeMin(delta) {
  clockM = ((clockM + delta) + 60) % 60;
  renderClock();
}

function onWheelHour(e) {
  e.preventDefault();
  changeHour(e.deltaY < 0 ? 1 : -1);
}

function onWheelMin(e) {
  e.preventDefault();
  changeMin(e.deltaY < 0 ? 1 : -1);
}

function confirmClock() {
  const time = String(clockH).padStart(2,'0') + ':' + String(clockM).padStart(2,'0');
  if (clockCallback) clockCallback(time);
  closeClock();
}
</script>
